apiVersion: apps/v1
kind: Deployment
metadata:
  name: choice-editor
  labels:
    app: choice-editor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: choice-editor
  template:
    metadata:
      labels:
        app: choice-editor
    spec:
      containers:
      - name: choice-editor
        image: registry.cn-shanghai.aliyuncs.com/invs/choice-editor:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        startupProbe:
          httpGet:
            path: /healthz
            port: http
            httpHeaders:
            - name: Host
              value: localhost
          periodSeconds: 2
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
            httpHeaders:
            - name: Host
              value: localhost
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
            httpHeaders:
            - name: Host
              value: localhost
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
          readOnly: true
      volumes:
      - name: nginx-config
        configMap:
          name: choice-editor-nginx-config
