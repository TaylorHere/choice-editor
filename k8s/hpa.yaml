apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: choice-editor-hpa
  labels:
    app: choice-editor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: choice-editor
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
